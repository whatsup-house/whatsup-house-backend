name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build -x test

      - name: Rename JAR
        run: cp build/libs/*.jar app.jar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: ssh ec2-user@${{ secrets.EC2_HOST }} "mkdir -p ~/whatsup"

      - name: Write .env
        run: |
          printf '%s\n' \
            "DB_URL=${{ secrets.DB_URL }}" \
            "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "REDIS_HOST=redis" \
            "REDIS_PORT=6379" \
            | ssh ec2-user@${{ secrets.EC2_HOST }} "cat > ~/whatsup/.env"

      - name: Copy files
        run: |
          scp app.jar Dockerfile docker-compose.prod.yml \
            ec2-user@${{ secrets.EC2_HOST }}:~/whatsup/

      - name: Deploy
        run: |
          ssh ec2-user@${{ secrets.EC2_HOST }} "
            cd ~/whatsup &&
            docker compose -f docker-compose.prod.yml up -d --build
          "
