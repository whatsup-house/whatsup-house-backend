name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew build -x test

      - name: Rename JAR
        run: cp build/libs/*.jar app.jar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deploy directory
        run: ssh ec2-user@${{ secrets.EC2_HOST }} "mkdir -p ~/whatsup"

      - name: Write .env
        run: |
          printf '%s\n' \
            "DB_URL=${{ secrets.DB_URL }}" \
            "DB_USERNAME=${{ secrets.DB_USERNAME }}" \
            "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "REDIS_HOST=redis" \
            "REDIS_PORT=6379" \
            | ssh ec2-user@${{ secrets.EC2_HOST }} "cat > ~/whatsup/.env"

      - name: Copy docker-compose
        run: |
          scp docker-compose.prod.yml \
            ec2-user@${{ secrets.EC2_HOST }}:~/whatsup/

      - name: Deploy
        run: |
          ssh ec2-user@${{ secrets.EC2_HOST }} "
            cd ~/whatsup &&
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin &&
            docker compose -f docker-compose.prod.yml pull &&
            docker compose -f docker-compose.prod.yml up -d
          "
